<!doctype html>
<html lang="ua">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasl-Clo</title>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <!-- <meta property="og:url" content="https://kasl-clo.onrender.com/" /> -->
    <meta property="og:title" content="Kasl-clo — каталог одягу" />
    <meta property="og:description" content="Переглядайте стильний одяг онлайн у Kasl-clo" />
    <meta property="og:image" content="https://kasl-clo.onrender.com/logo.png" />
  </head>
  <body style="margin:0; padding:0; overflow-x: hidden;">
    <!-- у public/index.html, ПЕРЕД підключенням твого бандла -->
    <script>
      (function () {
        const saved = localStorage.getItem('theme');
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = saved || (prefersLight ? 'light' : 'dark');
        document.documentElement.classList.remove('light','dark'); // на всяк випадок
        document.body.classList.add(theme);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
